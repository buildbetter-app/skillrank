name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: skillrank-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: skillrank-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: skillrank-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: skillrank-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p skillrank
      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/skillrank ${{ matrix.artifact }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
