name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    # Developer ID signing is OPTIONAL. When the cert secrets are absent the
    # macOS steps are skipped and we ship the ad-hoc signature the Rust linker
    # already applies — which is all a `curl | sh` install needs, since curl
    # never sets the com.apple.quarantine flag that triggers Gatekeeper.
    # Without this guard a missing secret fails the whole macOS build, which is
    # exactly what happened in v0.1.2 (macOS assets never published).
    env:
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: skillrank-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: skillrank-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: skillrank-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: skillrank-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p skillrank
      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/skillrank ${{ matrix.artifact }}

      - name: Import Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_MACOS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12

      - name: Code sign binary
        if: runner.os == 'macOS' && env.HAS_MACOS_SIGNING == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" ${{ matrix.artifact }}
          codesign -dv --verbose=4 ${{ matrix.artifact }}

      - name: Notarize binary
        if: runner.os == 'macOS' && env.HAS_MACOS_SIGNING == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode > "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          ditto -c -k --keepParent ${{ matrix.artifact }} ${{ matrix.artifact }}.zip
          xcrun notarytool submit ${{ matrix.artifact }}.zip \
            --key "private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          rm -rf private_keys ${{ matrix.artifact }}.zip
          # Standalone command-line tools can't carry a stapled ticket (that only
          # applies to bundles/dmg/pkg) — Gatekeeper does an online ticket lookup
          # by CDHash on first run instead, so notarization alone is sufficient.

      - name: Delete signing keychain
        if: always() && runner.os == 'macOS' && env.HAS_MACOS_SIGNING == 'true'
        run: security delete-keychain build.keychain || true

      # Must run after code signing — codesign rewrites the binary, so hashing
      # any earlier would publish a checksum that never matches what users get.
      - name: Publish SHA-256 checksum
        run: shasum -a 256 ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
